name: 打包 waterRPA 成 exe

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 升级 pip
        run: python -m pip install --upgrade pip

      - name: 安装项目依赖
        run: |
          pip install pyqt5
          pip install pyinstaller

      - name: 执行打包（修复版命令）
        run: |
          pyinstaller -w -F --icon="logo.ico" --add-data "ui;ui" --add-data "resource;resource" main.py

      - name: 上传打包好的 exe
        uses: actions/upload-artifact@v4
        with:
          name: waterRPA-exe
          path: dist/main.exe
