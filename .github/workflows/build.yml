name: 自动打包 RPA 工具为 EXE

on:
  push:
    branches: [ main ]  # 推送到 main 分支就自动打包
  workflow_dispatch:    # 也可以手动点一下打包

jobs:
  build:
    runs-on: windows-latest  # 必须用 Windows 才能打包 exe
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pyautogui pyperclip PySide6

      - name: 打包成 EXE
        run: |
          pyinstaller -w -F --noconsole --hidden-import=PySide6 --hidden-import=pyautogui --hidden-import=pyperclip rpa.py

      - name: 上传 EXE 供下载
        uses: actions/upload-artifact@v4
        with:
          name: RPA-Tool-EXE
          path: dist/*.exe
